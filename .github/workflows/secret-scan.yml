name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: Detect leaked secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for gitleaks-action to post PR comments (optional but harmless)
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can diff against the base branch on PRs
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only needed for private repos on paid plan;
          # the free tier (public repos) works without it.
          # Uncomment and add the secret if this repo is private:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # ── Extra grep pass for project-specific patterns ──────────────────────
      # Gitleaks covers common rules; this step adds patterns from our
      # local pre-commit hook that are specific to the Gustafta stack.
      - name: Check project-specific secret patterns
        shell: bash
        run: |
          set +e   # don't abort on grep exit-code 1 (no match = ok)

          PATTERNS=(
            'xkeysib-[A-Za-z0-9_-]{10,}'
            'sk-[A-Za-z0-9_-]{20,}'
            'sk_[A-Za-z0-9_-]{10,}'
            'FONNTE_API_KEY\s*=\s*[A-Za-z0-9_-]{10,}'
            'Bearer [A-Za-z0-9._~+/\-]{20,}'
            '\[userenv\.shared\]'
            '(DEEPSEEK|GEMINI|QWEN|NVIDIA|OPENROUTER|META_CAPI|META_PIXEL|SCALEV|BREVO|FONNTE|TENDER_INGEST|SESSION_SECRET)[_A-Z]*(API_KEY|ACCESS_TOKEN|WEBHOOK_SECRET|KEY)?\s*=\s*[A-Za-z0-9_\-\.]{16,}'
          )

          SKIP_DIRS="node_modules dist .git .agents/memory scripts/hooks"

          FOUND=0
          for PAT in "${PATTERNS[@]}"; do
            EXCLUDE_ARGS=""
            for D in $SKIP_DIRS; do
              EXCLUDE_ARGS="$EXCLUDE_ARGS --exclude-dir=$D"
            done
            # Also skip the workflow file itself and the hook source
            MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" --include="*.js" \
                           --include="*.mjs" --include="*.json" --include="*.env" \
                           --include="*.replit" --include="*.yml" --include="*.yaml" \
                           --include="*.sh" --include="*.md" \
                           $EXCLUDE_ARGS -E "$PAT" . \
                      | grep -v "^\.github/workflows/secret-scan\.yml:" \
                      | grep -v "^scripts/hooks/" \
                      | grep -v "^scripts/install-hooks\.sh:" \
                      || true)
            if [[ -n "$MATCHES" ]]; then
              echo "::error::Secret pattern detected: $PAT"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          if [[ $FOUND -ne 0 ]]; then
            echo ""
            echo "One or more secret patterns were found in the repository."
            echo "Remove the plaintext values and store them in GitHub Secrets / Replit Secrets."
            echo "If a key already reached git history → rotate it at the provider dashboard."
            exit 1
          fi

          echo "No project-specific secret patterns found."
